<app-header/>
<div class="container-fluid">
  <form (ngSubmit)="onUpdate()">
    <div class="form-group">
      <label>Name</label>
      <input type="text" class="form-control" [(ngModel)]="employee.name" name="name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-control" [(ngModel)]="employee.email" name="email">
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" class="form-control" [(ngModel)]="employee.department" name="department">
    </div>
    <div class="form-group">
      <label>Salary</label>
      <input type="number" class="form-control" [(ngModel)]="employee.salary" name="salary">
    </div>
    <div class="form-group">
      <label>Joining Date</label>
      <input type="date" class="form-control" [(ngModel)]="employee.joinedDate" name="joinedDate">
    </div>
    <button type="submit" class="btn btn-success mt-2">Update</button>
  </form>
</div>
